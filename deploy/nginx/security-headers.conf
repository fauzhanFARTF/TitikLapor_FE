# ============================================================================
# Header keamanan — DIHASILKAN OTOMATIS oleh scripts/gen-headers.js.
# Jangan sunting berkas ini langsung; ubah security-headers.js lalu jalankan
#   npm run gen:headers
#
# Sertakan di dalam blok server:
#   include /etc/nginx/snippets/titiklapor-security.conf;
# ============================================================================

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.tile.opentopomap.org https://api.titiklapor.id https://*.supabase.co; font-src 'self' data:; connect-src 'self' https://api.titiklapor.id https://*.supabase.co; media-src 'self' blob:; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; frame-src 'none'; upgrade-insecure-requests" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(self), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(self), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), usb=(), xr-spatial-tracking=(), interest-cohort=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header X-DNS-Prefetch-Control "off" always;

# Sembunyikan versi Nginx dari respons.
server_tokens off;
