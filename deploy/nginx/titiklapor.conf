# ============================================================================
# Nginx — Titik Lapor (frontend Vue + proxy API Django)
# ----------------------------------------------------------------------------
# Pasang:
#   sudo cp deploy/nginx/security-headers.conf /etc/nginx/snippets/titiklapor-security.conf
#   sudo cp deploy/nginx/titiklapor.conf       /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/titiklapor.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d titiklapor.example.id     # menambah blok 443 + redirect
#
# Ganti "titiklapor.example.id" dengan domain Anda.
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name titiklapor.example.id;

    # Hasil `npm run build` disalin ke sini.
    root /var/www/titiklapor/dist;
    index index.html;

    client_max_body_size 10m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Header keamanan (dihasilkan scripts/gen-headers.js).
    include /etc/nginx/snippets/titiklapor-security.conf;

    # ---- SPA Vue: rute non-berkas jatuh ke index.html ----------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html tidak boleh di-cache supaya rilis baru langsung terpakai.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # ---- REST API Django (gunicorn di 127.0.0.1:8000) ----------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Django membaca header ini untuk mengetahui request aslinya HTTPS.
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hasil collectstatic Django (aset admin & DRF).
    location /static/ {
        alias /var/www/titiklapor/staticfiles/;
        access_log off;
        expires 30d;
    }

    location /media/ {
        alias /var/www/titiklapor/media/;
        access_log off;
        expires 7d;
    }

    # ---- Aset build Vite (nama ber-hash, aman di-cache lama) ----------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }
}
